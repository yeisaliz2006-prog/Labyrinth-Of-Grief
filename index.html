<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinth Of Grief — Production Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0806; --surface: #120f0a; --surface2: #1a1410; --surface3: #221c15;
  --border: #2e2318; --red: #a01a1a; --red-bright: #e03030; --red-dim: #6b1a1a;
  --red-glow: rgba(180,30,30,0.12); --blocked: #8b2a1a; --blocked-bright: #d44a2a;
  --green: #2a5c2a; --green-bright: #4a9c4a; --blue: #1a3a6b; --blue-bright: #4a7cc7;
  --text: #d4c4a0; --text-dim: #7a6a50; --text-bright: #f0e0c0;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Crimson Pro',Georgia,serif; font-size:16px; min-height:100vh; overflow-x:hidden; }

/* ── (your existing CSS remains unchanged – keeping it compact here) ── */
header { background:linear-gradient(180deg,#0d0a06 0%,var(--surface) 100%); border-bottom:1px solid var(--border); padding:0 2rem; position:sticky; top:0; z-index:200; display:flex; align-items:center; justify-content:space-between; height:64px; box-shadow:0 4px 32px rgba(0,0,0,0.6); }
.logo { font-family:'Cinzel',serif; font-size:1.1rem; font-weight:900; color:var(--red-bright); letter-spacing:0.15em; text-transform:uppercase; display:flex; align-items:center; gap:0.75rem; }
.logo-icon { width:24px; height:24px; background:var(--red); clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); animation:torchflicker 3s ease-in-out infinite; }
@keyframes torchflicker { 0%,100%{opacity:1;transform:scale(1)} 25%{opacity:0.8;transform:scale(0.97)} 50%{opacity:1;transform:scale(1.02)} 75%{opacity:0.9;transform:scale(0.98)} }
/* ... rest of your CSS ... (omitted for brevity in this message – keep your original styles) */
.drawer-delete { width:100%; padding:0.6rem; background:none; border:1px solid #3a1010; color:#7a3030; font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; border-radius:3px; transition:all .2s; margin-top:0.25rem; }
.drawer-delete:hover { background:rgba(160,26,26,0.18); border-color:var(--red-bright); color:var(--red-bright); box-shadow:0 0 8px rgba(160,26,26,0.2); }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon"></div>Labyrinth Of Grief</div>
  <div class="header-right">
    <div class="header-stats">
      <div class="stat-item"><span class="stat-num" id="stat-done">0</span><span class="stat-label">Complete</span></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><span class="stat-num" id="stat-inprog">0</span><span class="stat-label">In Progress</span></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><span class="stat-num" id="stat-total">0</span><span class="stat-label">Total Tasks</span></div>
    </div>
    <div class="sync-badge syncing" id="syncBadge"><div class="sync-dot"></div><span id="syncLabel">Connecting</span></div>
  </div>
</header>

<div class="progress-bar-wrap">
  <span class="progress-label">Overall Progress</span>
  <div class="progress-track"><div class="progress-fill" id="global-fill" style="width:0%"></div></div>
  <span class="progress-pct" id="global-pct">0%</span>
</div>

<div class="collab-bar">
  <span class="collab-label">Online</span>
  <div class="collab-avatars" id="collabAvatars"></div>
  <span class="last-sync" id="lastSync">—</span>
</div>

<div class="container">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content" id="main-content"></div>
</div>

<!-- Task Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="APP.closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close-btn" onclick="APP.closeDrawer()">✕</button>
  <div class="drawer-header">
    <div class="drawer-phase-tag" id="dPhaseTag"></div>
    <div class="drawer-task-name" id="dTaskNameDisplay"></div>
    <div class="drawer-status-row" id="dStatusRow"></div>
  </div>
  <div class="drawer-body">
    <div class="drawer-field">
      <label class="drawer-label">✎ Task Name</label>
      <input class="di" id="dTaskName" placeholder="Task name…" autocomplete="off">
    </div>
    <div class="drawer-field">
      <label class="drawer-label">⚔ Assignee</label>
      <input class="di" id="dAssignee" placeholder="Who owns this task?" autocomplete="off">
    </div>
    <div class="drawer-field">
      <label class="drawer-label">◷ Estimated Timeframe</label>
      <select class="di" id="dTimeframe">
        <option value="">— Select estimate —</option>
        <option value="1-2h">1–2 hours</option>
        <option value="half-day">Half day</option>
        <option value="1d">1 day</option>
        <option value="2-3d">2–3 days</option>
        <option value="1w">~1 week</option>
        <option value="2w">~2 weeks</option>
        <option value="1m">~1 month</option>
        <option value="ongoing">Ongoing</option>
      </select>
    </div>
    <div class="drawer-field">
      <label class="drawer-label">✦ Notes & Details</label>
      <textarea class="di" id="dNotes" placeholder="Blockers, references, decisions, links…"></textarea>
    </div>
  </div>
  <div class="drawer-footer">
    <div class="drawer-footer-actions">
      <button class="drawer-cancel" onclick="APP.closeDrawer()">Cancel</button>
      <button class="drawer-save" onclick="APP.saveDrawer()">Save Changes</button>
    </div>
    <button class="drawer-delete" onclick="APP.deleteTask()"><span style="color:var(--red-bright)">🗑 Permanently Delete</span></button>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMdDRWGxpCIk60YRn355xXK4TASE8zBbo",
  authDomain: "labyrinth-of-grief-6a2e2.firebaseapp.com",
  databaseURL: "https://labyrinth-of-grief-6a2e2-default-rtdb.firebaseio.com",
  projectId: "labyrinth-of-grief-6a2e2",
  storageBucket: "labyrinth-of-grief-6a2e2.firebasestorage.app",
  messagingSenderId: "148640942330",
  appId: "1:148640942330:web:8f091f07193cd434bba143"
};

const PHASES = [ /* your PHASES array – keep it unchanged */ 
  { id:'overview', num:'★', title:'Project Overview', subtitle:'Full pipeline at a glance', isOverview:true },
  // ... rest of PHASES (copy from your original code)
];

const SID = Math.random().toString(36).slice(2,8).toUpperCase();
const COLORS = ['#e03030','#4a7cc7','#4a9c4a','#c8a030','#9c4a9c','#30c8c8','#c87040','#7cc740'];
const MY_COLOR = COLORS[Math.floor(Math.random()*COLORS.length)];

let state = {};
let db, stateRef, presenceRef;
let currentId = 'overview';
let dStatus = 'todo';
let dCtx = null;
let pendingWrites = 0;

const $ = id => document.getElementById(id);

function badge(s, label) {
  const b = $('syncBadge'), l = $('syncLabel');
  b.className = 'sync-badge ' + s;
  l.textContent = label || { syncing:'Syncing…', live:'Live', offline:'Offline' }[s] || s;
}

function toast(msg, dur = 2800) {
  const c = $('toastContainer'), el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg; c.appendChild(el);
  setTimeout(() => { el.classList.add('fadeout'); setTimeout(() => el.remove(), 400); }, dur);
}

// ──────────────────────────────────────────────────────────────────────────────
// FIREBASE
// ──────────────────────────────────────────────────────────────────────────────

function initFirebase() {
  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    stateRef = ref(db, 'pipeline/state');
    presenceRef = ref(db, 'pipeline/presence');

    badge('syncing');

    onValue(stateRef, snap => {
      if (pendingWrites > 0) {
        console.log('[sync] Ignoring snapshot – local writes still pending');
        return;
      }
      state = snap.val() || {};
      show(currentId);
      updateStats();
      badge('live');
      $('lastSync').textContent = 'Live · ' + new Date().toLocaleTimeString();
    });

    heartbeat();
    setInterval(heartbeat, 15000);
    setInterval(cleanPresence, 30000);
    toast('Connected — You are ' + SID);
  } catch(e) {
    console.error(e);
    badge('offline');
    toast('Firebase connection failed');
  }
}

async function persist(patch) {
  if (!Object.keys(patch).length) return;

  pendingWrites++;

  // Optimistic UI update
  Object.assign(state, patch);
  show(currentId);
  updateStats();

  if (!db) {
    pendingWrites--;
    return;
  }

  try {
    badge('syncing');
    await update(stateRef, patch);
  } catch (e) {
    console.error('persist failed', e);
    badge('offline');
    toast('Save failed – check connection');
  } finally {
    pendingWrites = Math.max(0, pendingWrites - 1);
    if (pendingWrites === 0) badge('live');
  }
}

async function heartbeat() {
  if (!db) return;
  try {
    await set(ref(db, 'pipeline/presence/' + SID), { id:SID, color:MY_COLOR, ts:Date.now() });
    const snap = await get(presenceRef);
    const all = snap.val() || {};
    const active = Object.values(all).filter(u => Date.now() - u.ts < 45000);
    $('collabAvatars').innerHTML = active.map(u =>
      `<div class="collab-avatar" style="background:${u.color}25;border-color:${u.color}60;color:${u.color}" title="User ${u.id}${u.id===SID?' (you)':''}">${u.id.slice(0,2)}</div>`
    ).join('');
    if (active.length > 1) badge('live', active.length + ' Online');
  } catch(e) {}
}

async function cleanPresence() {
  if (!db) return;
  try {
    const snap = await get(presenceRef);
    const all = snap.val() || {}, updates = {};
    for (const [k, v] of Object.entries(all)) {
      if (Date.now() - v.ts > 60000) updates['pipeline/presence/' + k] = null;
    }
    if (Object.keys(updates).length) await update(ref(db), updates);
  } catch(e) {}
}

// ──────────────────────────────────────────────────────────────────────────────
// HELPERS (fk, getMeta, getS, setMeta, pStats, etc.) – keep mostly unchanged
// ──────────────────────────────────────────────────────────────────────────────

function fk(p, g, t) { return p + '|||' + g + '|||' + btoa(unescape(encodeURIComponent(t))).replace(/[.#$/[\]]/g,'_'); }
function getMeta(p,g,t) { return state[fk(p,g,t)] || {}; }
function getS(p,g,t) { return getMeta(p,g,t).status || 'todo'; }
async function setMeta(p,g,t,m) {
  const k = fk(p,g,t);
  const patch = {}; patch[k] = { ...getMeta(p,g,t), ...m };
  await persist(patch);
}

// ... keep resolvedTasks, pStats, allStats, cyc, ico, slbl, scls, tflbl, pills unchanged ...

// ──────────────────────────────────────────────────────────────────────────────
// RENDER & ACTIONS (keep most, just ensure they call persist correctly)
// ──────────────────────────────────────────────────────────────────────────────

// show, updateStats, doToggle, doCyc, doAdd, doNote – keep as is

async function saveDrawer() {
  if (!dCtx) return;
  const { pid, g, t } = dCtx;
  const newName = ($('dTaskName').value || '').trim() || t;
  const meta = {
    status: dStatus,
    assignee: $('dAssignee').value.trim(),
    timeframe: $('dTimeframe').value,
    notes: $('dNotes').value.trim(),
  };

  if (newName !== t) {
    const patch = {};
    patch[fk(pid, g, newName)] = { ...getMeta(pid, g, t), ...meta };
    patch[fk(pid, g, t)] = null;

    const ck = '__custom__' + pid + '__' + g;
    const rk = '__renames__' + pid + '__' + g;

    if (state[ck]) {
      const custom = { ...state[ck] };
      const entry = Object.entries(custom).find(([,v]) => v === t);
      if (entry) {
        custom[entry[0]] = newName;
        patch[ck] = custom;
      }
    } else {
      const renames = { ...(state[rk] || {}) };
      let found = false;
      for (const [orig, val] of Object.entries(renames)) {
        if (val === t) { renames[orig] = newName; found = true; break; }
      }
      if (!found) renames[t] = newName;
      patch[rk] = renames;
    }

    await persist(patch);
  } else {
    await setMeta(pid, g, t, meta);
  }

  closeDrawer();
  show(currentId);
  toast('Task updated');
}

async function deleteTask() {
  if (!dCtx) return;
  const { pid, g, t } = dCtx;

  if (!confirm(`Permanently delete "${t}"?\nThis cannot be undone.`)) return;

  const patch = {};
  patch[fk(pid, g, t)] = null;

  const ck = '__custom__' + pid + '__' + g;
  if (state[ck]) {
    const custom = { ...state[ck] };
    const entry = Object.entries(custom).find(([,v]) => v === t);
    if (entry) {
      delete custom[entry[0]];
      patch[ck] = Object.keys(custom).length ? custom : null;
    }
  }

  const rk = '__renames__' + pid + '__' + g;
  if (state[rk]) {
    const renames = { ...state[rk] };
    let changed = false;
    for (const [orig, cur] of Object.entries(renames)) {
      if (cur === t) { delete renames[orig]; changed = true; break; }
    }
    if (!changed && renames[t]) { delete renames[t]; changed = true; }
    if (changed) patch[rk] = Object.keys(renames).length ? renames : null;
  }

  await persist(patch);
  closeDrawer();
  show(currentId);
  toast('Task permanently deleted');
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────

function boot() {
  // renderSidebar('overview');
  show('overview');
  initFirebase();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

window.APP = {
  show, closeDrawer, openDrawer, doToggle, doCyc, doAdd, doNote,
  selStatus: s => { dStatus = s; renderStatusChips(); },
  saveDrawer, deleteTask
};

// (keep openDrawer, renderStatusChips, etc. from your original code)
</script>
</body>
</html>
