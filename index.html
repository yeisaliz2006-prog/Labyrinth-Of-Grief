<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinth Of Grief — Production Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<!-- Firebase compat SDK (works on all static hosts including GitHub Pages) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root {
  --bg:#0a0806; --surface:#120f0a; --surface2:#1a1410; --surface3:#221c15;
  --border:#2e2318; --red:#a01a1a; --red-bright:#e03030; --red-dim:#6b1a1a;
  --red-glow:rgba(180,30,30,0.12);
  --green:#2a5c2a; --green-bright:#4a9c4a;
  --blue:#1a3a6b; --blue-bright:#4a7cc7;
  --amber:#8b5a00; --amber-bright:#d4900a;
  --text:#d4c4a0; --text-dim:#7a6a50; --text-bright:#f0e0c0;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Crimson Pro',Georgia,serif; font-size:16px; min-height:100vh; overflow-x:hidden; }

/* ── HEADER ── */
header { background:linear-gradient(180deg,#0d0a06,var(--surface)); border-bottom:1px solid var(--border); padding:0 2rem; position:sticky; top:0; z-index:200; display:flex; align-items:center; justify-content:space-between; height:60px; box-shadow:0 4px 32px rgba(0,0,0,.7); }
.logo { font-family:'Cinzel',serif; font-size:1rem; font-weight:900; color:var(--red-bright); letter-spacing:.18em; text-transform:uppercase; display:flex; align-items:center; gap:.6rem; }
.logo-star { color:var(--red-bright); font-size:1.1rem; animation:pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.header-right { display:flex; align-items:center; gap:1.5rem; }
.hstats { display:flex; gap:1.5rem; align-items:center; }
.hstat { text-align:center; }
.hstat-n { font-family:'Cinzel',serif; font-size:1.3rem; font-weight:600; color:var(--red-bright); display:block; line-height:1; }
.hstat-l { font-size:.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; }
.hdiv { width:1px; height:28px; background:var(--border); }
.sync { display:flex; align-items:center; gap:.35rem; font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.12em; text-transform:uppercase; color:var(--text-dim); padding:.28rem .65rem; border:1px solid var(--border); border-radius:2px; }
.sync-dot { width:5px; height:5px; border-radius:50%; background:var(--text-dim); }
.sync.connecting .sync-dot { background:var(--amber-bright); animation:blink .8s infinite; }
.sync.live .sync-dot { background:var(--green-bright); animation:blink 2s infinite; }
.sync.live { border-color:rgba(74,156,74,.3); }
.sync.offline .sync-dot { background:var(--red-bright); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── PROGRESS BAR ── */
.prog-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:.5rem 2rem; display:flex; align-items:center; gap:1rem; }
.prog-label { font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.12em; color:var(--text-dim); text-transform:uppercase; white-space:nowrap; min-width:110px; }
.prog-track { flex:1; height:5px; background:var(--surface3); border-radius:3px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--red-dim),var(--red-bright)); border-radius:3px; transition:width .6s ease; }
.prog-pct { font-family:'Cinzel',serif; font-size:.82rem; color:var(--red-bright); min-width:36px; text-align:right; }

/* ── COLLAB BAR ── */
.collab-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:.3rem 2rem; display:flex; align-items:center; gap:.6rem; min-height:30px; }
.collab-lbl { font-family:'Cinzel',serif; font-size:.56rem; letter-spacing:.14em; text-transform:uppercase; color:var(--text-dim); }
.collab-avatars { display:flex; gap:.25rem; }
.avatar { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.55rem; font-family:'Cinzel',serif; border:1px solid; }
.last-sync { margin-left:auto; font-size:.65rem; color:var(--text-dim); font-style:italic; }

/* ── LAYOUT ── */
.layout { display:grid; grid-template-columns:250px 1fr; height:calc(100vh - 104px); overflow:hidden; }
.sidebar { background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--red-dim) transparent; }
.sidebar::-webkit-scrollbar { width:3px; }
.sidebar::-webkit-scrollbar-thumb { background:var(--red-dim); }
.sidebar-hd { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.16em; color:var(--text-dim); text-transform:uppercase; padding:1rem 1.1rem .4rem; }
.nav-btn { display:flex; align-items:center; gap:.6rem; padding:.6rem 1.1rem; cursor:pointer; border-left:3px solid transparent; width:100%; background:none; border-right:none; border-top:none; border-bottom:none; text-align:left; color:var(--text); font-family:'Crimson Pro',serif; font-size:.92rem; transition:all .12s; }
.nav-btn:hover { background:var(--red-glow); color:var(--text-bright); }
.nav-btn.active { background:var(--red-glow); border-left-color:var(--red); color:var(--red-bright); }
.nav-num { font-family:'Cinzel',serif; font-size:.65rem; color:var(--red-dim); min-width:18px; }
.nav-btn.active .nav-num { color:var(--red); }
.nav-pct { margin-left:auto; font-size:.68rem; color:var(--text-dim); }
.nav-btn.active .nav-pct { color:var(--red); }

.main { overflow-y:auto; padding:1.75rem 2rem; scrollbar-width:thin; scrollbar-color:var(--red-dim) transparent; }
.main::-webkit-scrollbar { width:3px; }
.main::-webkit-scrollbar-thumb { background:var(--red-dim); }

/* ── PANEL HEADER ── */
.ph { margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; }
.ph-left { flex:1; }
.ph-tag { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.16em; text-transform:uppercase; color:var(--red-dim); margin-bottom:.3rem; }
.ph-title { font-family:'Cinzel',serif; font-size:1.5rem; font-weight:600; color:var(--text-bright); margin-bottom:.25rem; }
.ph-sub { font-size:.95rem; color:var(--text-dim); font-style:italic; }
.ph-ring { text-align:center; flex-shrink:0; }
.ph-ring-n { font-family:'Cinzel',serif; font-size:1.4rem; color:var(--red-bright); line-height:1; }
.ph-ring-l { font-size:.6rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.08em; }

/* ── OVERVIEW ── */
.ov-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.85rem; }
.ov-card { background:var(--surface); border:1px solid var(--border); padding:.9rem; border-radius:3px; cursor:pointer; transition:all .12s; position:relative; overflow:hidden; }
.ov-card:hover { border-color:var(--red-dim); background:var(--surface2); }
.ov-bar { position:absolute; bottom:0; left:0; height:2px; background:linear-gradient(90deg,var(--red-dim),var(--red-bright)); }
.ov-num { font-family:'Cinzel',serif; font-size:.62rem; color:var(--red-dim); letter-spacing:.1em; margin-bottom:.25rem; }
.ov-title { font-family:'Cinzel',serif; font-size:.85rem; color:var(--text-bright); margin-bottom:.35rem; line-height:1.3; }
.ov-pct { font-size:1.7rem; font-family:'Cinzel',serif; color:var(--red-bright); line-height:1; margin-bottom:.15rem; }
.ov-sub { font-size:.75rem; color:var(--text-dim); }
.legend { display:flex; gap:1.2rem; margin-bottom:1rem; flex-wrap:wrap; }
.leg-item { display:flex; align-items:center; gap:.35rem; font-size:.78rem; color:var(--text-dim); }
.leg-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* ── TASKS ── */
.tgroup { margin-bottom:1.4rem; }
.tgroup-hd { font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.12em; color:var(--text-dim); text-transform:uppercase; margin-bottom:.5rem; padding-bottom:.35rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:.4rem; }
.tgroup-ct { color:var(--red-dim); font-size:.65rem; }
.task { display:flex; align-items:center; gap:.65rem; padding:.55rem .7rem; margin-bottom:2px; background:var(--surface); border:1px solid var(--border); border-radius:3px; cursor:pointer; transition:all .12s; position:relative; }
.task::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:3px 0 0 3px; background:var(--border); transition:background .12s; }
.task:hover { border-color:var(--red-dim); background:var(--surface2); }
.task:hover::before { background:var(--red-dim); }
.task.done::before { background:var(--green-bright); }
.task.done { opacity:.58; }
.task.inprogress::before { background:var(--red); box-shadow:0 0 5px rgba(160,26,26,.45); }
.task.review::before { background:var(--blue-bright); }
.task.blocked::before { background:#d44a2a; }
.task-chk { width:17px; height:17px; border:1px solid var(--border); border-radius:2px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:.7rem; flex-shrink:0; cursor:pointer; transition:all .12s; }
.task.done    .task-chk { background:var(--green); border-color:var(--green-bright); color:var(--green-bright); }
.task.inprogress .task-chk { background:var(--red-dim); border-color:var(--red); color:var(--red-bright); }
.task.review  .task-chk { background:var(--blue); border-color:var(--blue-bright); color:var(--blue-bright); }
.task.blocked .task-chk { background:#5a1a0a; border-color:#d44a2a; color:#d44a2a; }
.task-name { flex:1; font-size:.92rem; color:var(--text); line-height:1.3; }
.task.done .task-name { text-decoration:line-through; color:var(--text-dim); }
.task-pills { display:flex; gap:.3rem; align-items:center; flex-shrink:0; }
.pill { font-size:.56rem; padding:1px 5px; border-radius:2px; border:1px solid; font-family:'Cinzel',serif; white-space:nowrap; }
.pill-a { border-color:rgba(74,124,199,.5); color:#7aacdf; background:rgba(26,58,107,.25); }
.pill-t { border-color:rgba(74,156,74,.5); color:#7acf7a; background:rgba(42,92,42,.18); }
.task-sbtn { font-size:.6rem; padding:2px 7px; border-radius:2px; border:1px solid; cursor:pointer; font-family:'Cinzel',serif; letter-spacing:.05em; text-transform:uppercase; background:none; transition:all .12s; white-space:nowrap; flex-shrink:0; }
.sbtn-todo     { border-color:var(--text-dim); color:var(--text-dim); }
.sbtn-inprogress { border-color:var(--red); color:var(--red); }
.sbtn-review   { border-color:var(--blue-bright); color:var(--blue-bright); }
.sbtn-done     { border-color:var(--green-bright); color:var(--green-bright); }
.sbtn-blocked  { border-color:#d44a2a; color:#d44a2a; }

/* ── ADD TASK ROW ── */
.add-row { display:flex; gap:.4rem; margin-top:.65rem; }
.add-inp { flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:.42rem .65rem; font-family:'Crimson Pro',serif; font-size:.88rem; border-radius:3px; outline:none; }
.add-inp:focus { border-color:var(--red-dim); }
.add-inp::placeholder { color:var(--text-dim); font-style:italic; }
.add-btn { background:var(--red-dim); border:1px solid var(--red); color:var(--red-bright); padding:.42rem .85rem; font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; border-radius:3px; cursor:pointer; }
.add-btn:hover { background:var(--red); color:var(--bg); }

/* ── PHASE NOTES ── */
.notes-sec { margin-top:1.5rem; padding-top:1.2rem; border-top:1px solid var(--border); }
.notes-lbl { font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.12em; color:var(--text-dim); text-transform:uppercase; margin-bottom:.4rem; }
.notes-ta { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:.65rem; font-family:'Crimson Pro',serif; font-size:.92rem; line-height:1.6; font-style:italic; resize:vertical; min-height:80px; border-radius:3px; outline:none; }
.notes-ta:focus { border-color:var(--red-dim); }

/* ── DRAWER ── */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:300; opacity:0; pointer-events:none; transition:opacity .2s; }
.overlay.open { opacity:1; pointer-events:all; }
.drawer { position:fixed; right:0; top:0; bottom:0; width:380px; max-width:96vw; background:var(--surface); border-left:1px solid var(--border); z-index:301; transform:translateX(110%); transition:transform .26s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
.drawer::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--red),transparent); pointer-events:none; }
.drawer.open { transform:translateX(0); }
.drawer-hd { padding:1.3rem 1.4rem .9rem; border-bottom:1px solid var(--border); background:linear-gradient(180deg,var(--surface2),var(--surface)); position:relative; flex-shrink:0; }
.drawer-close { position:absolute; top:.9rem; right:.9rem; background:none; border:1px solid var(--border); color:var(--text-dim); width:24px; height:24px; border-radius:2px; cursor:pointer; font-size:.7rem; display:flex; align-items:center; justify-content:center; }
.drawer-close:hover { border-color:var(--red-dim); color:var(--text); }
.drawer-tag { font-family:'Cinzel',serif; font-size:.56rem; letter-spacing:.18em; text-transform:uppercase; color:var(--red-dim); margin-bottom:.3rem; }
.drawer-taskname { font-family:'Cinzel',serif; font-size:.92rem; color:var(--text-bright); line-height:1.4; margin-bottom:.85rem; padding-right:2rem; }
.status-row { display:flex; gap:.35rem; flex-wrap:wrap; }
.schip { font-family:'Cinzel',serif; font-size:.55rem; letter-spacing:.1em; text-transform:uppercase; padding:.24rem .6rem; border:1px solid var(--border); border-radius:2px; cursor:pointer; color:var(--text-dim); user-select:none; transition:all .12s; }
.schip:hover { border-color:var(--text-dim); color:var(--text); }
.schip-todo.sel      { background:rgba(122,106,80,.2); border-color:var(--text-dim); color:var(--text-bright); }
.schip-inprogress.sel { background:var(--red-dim); border-color:var(--red); color:var(--red-bright); }
.schip-review.sel    { background:var(--blue); border-color:var(--blue-bright); color:var(--blue-bright); }
.schip-done.sel      { background:var(--green); border-color:var(--green-bright); color:var(--green-bright); }
.schip-blocked.sel   { background:#5a1a0a; border-color:#d44a2a; color:#d44a2a; }

.drawer-body { padding:1.1rem 1.4rem; flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:1rem; }
.dfield { display:flex; flex-direction:column; gap:.3rem; }
.dlabel { font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.15em; text-transform:uppercase; color:var(--text-dim); }
.dinput { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:.45rem .65rem; font-family:'Crimson Pro',serif; font-size:.92rem; border-radius:3px; outline:none; width:100%; }
.dinput:focus { border-color:var(--red-dim); }
.dinput::placeholder { color:var(--text-dim); font-style:italic; }
select.dinput { font-family:'Cinzel',serif; font-size:.72rem; cursor:pointer; }
select.dinput option { background:var(--surface2); }
textarea.dinput { resize:vertical; min-height:85px; line-height:1.55; font-style:italic; }

.drawer-ft { padding:.9rem 1.4rem 1.3rem; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:.45rem; flex-shrink:0; }
.ft-row { display:flex; gap:.5rem; }
.btn-save { flex:1; padding:.6rem; background:var(--red-dim); border:1px solid var(--red); color:var(--red-bright); font-family:'Cinzel',serif; font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; cursor:pointer; border-radius:3px; }
.btn-save:hover { background:var(--red); color:var(--bg); }
.btn-cancel { padding:.6rem .9rem; background:none; border:1px solid var(--border); color:var(--text-dim); font-family:'Cinzel',serif; font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; border-radius:3px; }
.btn-cancel:hover { border-color:var(--text-dim); color:var(--text); }
.btn-delete { width:100%; padding:.55rem; background:none; border:1px solid #2e1010; color:#6a2828; font-family:'Cinzel',serif; font-size:.64rem; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; border-radius:3px; transition:all .18s; }
.btn-delete:hover { background:rgba(160,26,26,.15); border-color:var(--red-bright); color:var(--red-bright); }

/* ── TOASTS ── */
.toasts { position:fixed; bottom:1.2rem; right:1.2rem; z-index:500; display:flex; flex-direction:column; gap:.4rem; pointer-events:none; }
.toast { background:var(--surface2); border:1px solid var(--border); border-left:3px solid var(--red); padding:.55rem .9rem; font-size:.8rem; color:var(--text); border-radius:3px; animation:tin .25s ease; max-width:280px; }
.toast.out { animation:tout .35s ease forwards; }
@keyframes tin  { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
@keyframes tout { to{opacity:0;transform:translateY(4px)} }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-star">&#9733;</span> Labyrinth Of Grief</div>
  <div class="header-right">
    <div class="hstats">
      <div class="hstat"><span class="hstat-n" id="sDone">0</span><span class="hstat-l">Complete</span></div>
      <div class="hdiv"></div>
      <div class="hstat"><span class="hstat-n" id="sInprog">0</span><span class="hstat-l">In Progress</span></div>
      <div class="hdiv"></div>
      <div class="hstat"><span class="hstat-n" id="sTotal">0</span><span class="hstat-l">Total</span></div>
    </div>
    <div class="sync connecting" id="syncBadge">
      <div class="sync-dot"></div><span id="syncLbl">Connecting</span>
    </div>
  </div>
</header>

<div class="prog-bar">
  <span class="prog-label">Overall Progress</span>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <span class="prog-pct" id="progPct">0%</span>
</div>

<div class="collab-bar">
  <span class="collab-lbl">Online</span>
  <div class="collab-avatars" id="collabAv"></div>
  <span class="last-sync" id="lastSync"></span>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main"   id="main"></div>
</div>

<!-- Drawer -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer"  id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
  <div class="drawer-hd">
    <div class="drawer-tag"      id="dTag"></div>
    <div class="drawer-taskname" id="dName"></div>
    <div class="status-row"      id="dStatus"></div>
  </div>
  <div class="drawer-body">
    <div class="dfield">
      <label class="dlabel">&#x270E; Task Name</label>
      <input  class="dinput" id="dInpName"     placeholder="Task name&#8230;"          autocomplete="off">
    </div>
    <div class="dfield">
      <label class="dlabel">&#x2694; Assignee</label>
      <input  class="dinput" id="dInpAssign"   placeholder="Who owns this?"            autocomplete="off">
    </div>
    <div class="dfield">
      <label class="dlabel">&#x25F7; Timeframe</label>
      <select class="dinput" id="dInpTime">
        <option value="">&#8212; Select estimate &#8212;</option>
        <option value="1-2h">1&#8211;2 hours</option>
        <option value="half-day">Half day</option>
        <option value="1d">1 day</option>
        <option value="2-3d">2&#8211;3 days</option>
        <option value="1w">~1 week</option>
        <option value="2w">~2 weeks</option>
        <option value="1m">~1 month</option>
        <option value="ongoing">Ongoing</option>
      </select>
    </div>
    <div class="dfield">
      <label class="dlabel">&#x2726; Notes</label>
      <textarea class="dinput" id="dInpNotes" placeholder="Blockers, links, decisions&#8230;"></textarea>
    </div>
  </div>
  <div class="drawer-ft">
    <div class="ft-row">
      <button class="btn-cancel" onclick="closeDrawer()">Cancel</button>
      <button class="btn-save"   onclick="saveDrawer()">Save Changes</button>
    </div>
    <button class="btn-delete" onclick="deleteTask()">&#x1F5D1; Permanently Delete Task</button>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  PHASE / TASK DATA
// ═══════════════════════════════════════════════════════════════════════════
var PHASES = [
  { id:'overview', num:'&#9733;', title:'Project Overview', subtitle:'Full pipeline at a glance', overview:true },

  { id:'preproduction', num:'01', title:'Pre-Production', subtitle:'Concept & Planning', groups:[
    { name:'Concept & Vision', tasks:['Game Title and Tagline','One-Page Concept Document','Target Platform','Emotional Arc','Core Narrative Premise'] },
    { name:'Level Concepts', tasks:['Level 1 Concept','Level 2 Concept','Level 3 Concept','Intermission Scene Concept','Emotional Transition Beats'] },
    { name:'References & Moodboards', tasks:['Level 1 Moodboard','Level 2 Moodboard','Level 3 Moodboard','Player Movement References','Level Design References'] },
    { name:'Narrative Design', tasks:['Amnesia Arc Structure','Dog Rescue Payoff Moments','Village NPC Design','Boss Lore Content','Ending Sequence Script'] },
  ]},

  { id:'design', num:'02', title:'Game Design', subtitle:'Level & Systems Design', groups:[

// ── FIREBASE WRITE ───────────────────────────────────────────────────────────
// patch = plain object of path:value pairs under pipeline/state
// null values DELETE that path in Firebase (and stay deleted in onValue)
function saveState(patch) {
  // Apply locally immediately so UI feels instant
  for (var k in patch) {
    if (patch[k] === null) {
      delete STATE[k];
    } else {
      STATE[k] = patch[k];
    }
  }
  renderAll();

  if (!db) return;
  badge('connecting', 'Saving...');
  db.ref('pipeline/state').update(patch, function(err) {
    if (err) {
      console.error('Save error:', err);
      toast('Save failed — check console');
      badge('offline', 'Offline');
    }
  });
}

// ═══════════════════════════════════════════════════════════════════════════
//  STATE KEY HELPERS
//
//  All per-task data lives at a Firebase-safe key under pipeline/state.
//  We use base64 to handle arbitrary task names (spaces, special chars).
//
//  Key format:  "meta|||{phaseId}|||{groupName}|||{b64taskName}"
//  Custom list: "custom|||{phaseId}|||{groupName}"   →  { "0":"name","1":"name",... }
//  Renames:     "rename|||{phaseId}|||{groupName}"   →  { "b64orig":"b64new", ... }
//  Deleted:     "deleted|||{phaseId}|||{groupName}"  →  { "b64orig": true, ... }
//  Phase notes: "note|||{phaseId}"
// ═══════════════════════════════════════════════════════════════════════════
function b64(s)  { return btoa(unescape(encodeURIComponent(s))).replace(/[+/=]/g,'_'); }
function ub64(s) { try { return decodeURIComponent(escape(atob(s.replace(/_/g,function(c,i,a){ var map='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/='; return a.indexOf(c)>=0?c:['','+','/','='][i%3+0]||c; }))));} catch(e){ return s; } }

function metaKey(pid, grp, name) { return 'meta|||' + pid + '|||' + grp + '|||' + b64(name); }
function customKey(pid, grp)     { return 'custom|||' + pid + '|||' + grp; }
function renameKey(pid, grp)     { return 'rename|||' + pid + '|||' + grp; }
function deletedKey(pid, grp)    { return 'deleted|||' + pid + '|||' + grp; }
function noteKey(pid)            { return 'note|||' + pid; }

function getMeta(pid, grp, name) { return STATE[metaKey(pid, grp, name)] || {}; }
function getStatus(pid, grp, name) { return getMeta(pid, grp, name).status || 'todo'; }

// Returns the final visible task list for a group, applying renames and filtering deletes
function resolveGroup(pid, grpName, rawTasks) {
  var renames  = STATE[renameKey(pid, grpName)]  || {};
  var deleted  = STATE[deletedKey(pid, grpName)] || {};
  var customs  = STATE[customKey(pid, grpName)]  || {};

  // Build resolved built-in list
  var builtIn = [];
  rawTasks.forEach(function(orig) {
    var k = b64(orig);
    if (deleted[k]) return;           // skip deleted originals
    var renamed = renames[k];
    if (renamed) {
      var rk = b64(renamed);
      if (deleted[rk]) return;        // skip if renamed version was deleted
      builtIn.push(renamed);
    } else {
      builtIn.push(orig);
    }
  });

  // Custom tasks
  var custom = Object.values(customs);

  return builtIn.concat(custom);
}

//  STATS
// ═══════════════════════════════════════════════════════════════════════════
function phaseStats(ph) {
  if (ph.overview) return { done:0, prog:0, total:0 };
  var d=0, p=0, t=0;
  ph.groups.forEach(function(g) {
    var tasks = resolveGroup(ph.id, g.name, g.tasks);
    tasks.forEach(function(name) {
      t++;
      var s = getStatus(ph.id, g.name, name);
      if (s==='done') d++;
      else if (s==='inprogress') p++;
    });
  });
  return { done:d, prog:p, total:t };
}

function allStats() {
  var d=0, p=0, t=0;
  PHASES.forEach(function(ph) {
    if (ph.overview) return;
    var s = phaseStats(ph);
    d += s.done; p += s.prog; t += s.total;
  });
  return { done:d, prog:p, total:t };
}

function escHtml(s) {

}

// ═══════════════════════════════════════════════════════════════════════════
//  TASK ACTIONS
// ═══════════════════════════════════════════════════════════════════════════
function toggleTask(pid, gEnc, tEnc) {
  var g    = decodeURIComponent(gEnc);
  var name = decodeURIComponent(tEnc);
  var cur  = getStatus(pid, g, name);
  var patch = {};
  var k     = metaKey(pid, g, name);
  var meta  = getMeta(pid, g, name);
  patch[k]  = Object.assign({}, meta, { status: cur === 'done' ? 'todo' : 'done' });
  saveState(patch);
}

function cycleStatus(pid, gEnc, tEnc) {
  var g    = decodeURIComponent(gEnc);
  var name = decodeURIComponent(tEnc);
  var cur  = getStatus(pid, g, name);
  var next = { todo:'inprogress', inprogress:'review', review:'done', done:'blocked', blocked:'todo' }[cur] || 'todo';
  var patch = {};
  patch[metaKey(pid, g, name)] = Object.assign({}, getMeta(pid, g, name), { status: next });
  saveState(patch);
}

function addTask(pid, gEnc) {
  var g   = decodeURIComponent(gEnc);
  var inp = document.getElementById('ai-' + pid + '-' + gEnc);
  if (!inp) return;
  var val = inp.value.trim();
  if (!val) return;
  var ck      = customKey(pid, g);
  var existing = STATE[ck] || {};
  var idx     = Object.keys(existing).length;
  var patch   = {};
  patch[ck]   = Object.assign({}, existing);
  patch[ck][String(idx)] = val;
  saveState(patch);
  inp.value = '';
}

function saveNote(pid, val) {
  var patch = {};
  patch[noteKey(pid)] = val;
  saveState(patch);
}

function openDrawer(pid, gEnc, tEnc) {
  var g    = decodeURIComponent(gEnc);
  var name = decodeURIComponent(tEnc);
  dCtx     = { pid:pid, group:g, taskName:name };

  var ph   = PHASES.find(function(p){ return p.id === pid; });
  var meta = getMeta(pid, g, name);

  document.getElementById('dTag').textContent  = 'Phase ' + (ph ? ph.num : '') + ' — ' + (ph ? ph.title : '');
  document.getElementById('dName').textContent = name;
  document.getElementById('dInpName').value    = name;
  document.getElementById('dInpAssign').value  = meta.assignee  || '';
  document.getElementById('dInpTime').value    = meta.timeframe || '';
  document.getElementById('dInpNotes').value   = meta.notes     || '';

  dSelStatus = meta.status || 'todo';
  renderStatusChips();

  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  setTimeout(function(){ document.getElementById('dInpName').focus(); }, 260);
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  dCtx = null;
}

function renderStatusChips() {
  var html = STATUS_LIST.map(function(s) {
    return '<div class="schip schip-' + s + (dSelStatus===s ? ' sel' : '') + '" onclick="selectStatus(\'' + s + '\')">' + STATUS_LBL[s] + '</div>';
  }).join('');
  document.getElementById('dStatus').innerHTML = html;
}

function selectStatus(s) { dSelStatus = s; renderStatusChips(); }

function saveDrawer() {
  if (!dCtx) return;
  var pid     = dCtx.pid;
  var grp     = dCtx.group;
  var oldName = dCtx.taskName;
  var newName = document.getElementById('dInpName').value.trim() || oldName;
  var patch   = {};

  // ── Build updated meta ──────────────────────────────────────────────────
  var newMeta = Object.assign({}, getMeta(pid, grp, oldName), {
    status:    dSelStatus,
    assignee:  document.getElementById('dInpAssign').value.trim(),
    timeframe: document.getElementById('dInpTime').value,
    notes:     document.getElementById('dInpNotes').value.trim()
  });

  // ── Handle rename ───────────────────────────────────────────────────────
  if (newName !== oldName) {
    // Move meta to new key, clear old key
    patch[metaKey(pid, grp, newName)] = newMeta;
    patch[metaKey(pid, grp, oldName)] = null;

    // Check if oldName was a custom task
    var ck     = customKey(pid, grp);
    var custom = STATE[ck] ? Object.assign({}, STATE[ck]) : null;
    var custEntry = null;
    if (custom) {
      Object.keys(custom).forEach(function(idx) {
        if (custom[idx] === oldName) custEntry = idx;
      });
    }

    if (custEntry !== null) {
      // Rename in custom list
      custom[custEntry] = newName;
      patch[ck] = custom;
    } else {
      // Built-in task: find its true original name (before any prior renames)
      var rk      = renameKey(pid, grp);
      var renames = STATE[rk] ? Object.assign({}, STATE[rk]) : {};
      var origKey = b64(oldName); // default: oldName is the original
      // Check if oldName itself was already a renamed version
      Object.keys(renames).forEach(function(ob64) {
        if (renames[ob64] === oldName) origKey = ob64;
      });
      renames[origKey] = newName;
      patch[rk] = renames;
    }
  } else {
    patch[metaKey(pid, grp, oldName)] = newMeta;
  }

  saveState(patch);
  closeDrawer();
  toast('Task updated');
}

// ═══════════════════════════════════════════════════════════════════════════
//  DELETE TASK
//  Strategy: for built-in tasks we store the original (pre-rename) b64 key
//  in a "deleted" object under pipeline/state. Firebase KEEPS object keys
//  with boolean values, so they survive round-trips (unlike null sentinels).
//  resolveGroup() checks this set before rendering.
// ═══════════════════════════════════════════════════════════════════════════
function deleteTask() {
  if (!dCtx) return;
  var pid       = dCtx.pid;
  var grp       = dCtx.group;
  var taskName  = dCtx.taskName;

  if (!confirm('Permanently delete "' + taskName + '"?\nThis cannot be undone.')) return;

  var avEl = document.getElementById('collabAv');
  if (avEl && avEl.children.length > 1) {
    if (!confirm('Multiple people are online.\nDelete for everyone?')) return;
  }

  var patch = {};

  // Remove meta for this name and any previous names
  patch[metaKey(pid, grp, taskName)] = null;

  var ck      = customKey(pid, grp);
  var rk      = renameKey(pid, grp);
  var dk      = deletedKey(pid, grp);
  var custom  = STATE[ck] ? Object.assign({}, STATE[ck]) : null;
  var renames = STATE[rk] ? Object.assign({}, STATE[rk]) : {};
  var deleted = STATE[dk] ? Object.assign({}, STATE[dk]) : {};

  // Find if it is a custom task
  var custIdx = null;
  if (custom) {
    Object.keys(custom).forEach(function(i) {
      if (custom[i] === taskName) custIdx = i;
    });
  }

  if (custIdx !== null) {
    // Custom task: just remove from list
    delete custom[custIdx];
    patch[ck] = Object.keys(custom).length > 0 ? custom : null;
  } else {
    // Built-in task: find its original name key (before renames)
    var origB64 = b64(taskName); // assume original unless we find a rename entry
    Object.keys(renames).forEach(function(ob64) {
      if (renames[ob64] === taskName) origB64 = ob64;
    });

    // Mark original b64 key as deleted
    deleted[origB64] = true;
    patch[dk] = deleted;

    // Also mark the current (possibly renamed) b64 key as deleted
    var curB64 = b64(taskName);
    if (curB64 !== origB64) deleted[curB64] = true;

    // Clean up rename entry if it exists
    if (renames[origB64] !== undefined) {
      delete renames[origB64];
      patch[rk] = Object.keys(renames).length > 0 ? renames : null;
    }
  }

  saveState(patch);
  closeDrawer();
  toast('Task deleted');
}

// ═══════════════════════════════════════════════════════════════════════════
//  TOASTS
// ═══════════════════════════════════════════════════════════════════════════
function toast(msg, dur) {
  dur = dur || 2600;
  var c  = document.getElementById('toasts');
  var el = document.createElement('div');
  el.className   = 'toast';
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(function() {
    el.classList.add('out');
    setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 380);
  }, dur);
}

// ═══════════════════════════════════════════════════════════════════════════
//  BOOT — wait for DOM, then render immediately and connect Firebase
// ═══════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  renderAll();        // render with empty STATE so UI appears immediately
  initFirebase();     // connect + start live sync
});
</script>
