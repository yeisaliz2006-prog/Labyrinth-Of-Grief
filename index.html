<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinth Of Grief — Production Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0806;--surface:#120f0a;--surface2:#1a1410;--surface3:#221c15;--border:#2e2318;--red:#a01a1a;--red-bright:#e03030;--red-dim:#6b1a1a;--red-glow:rgba(180,30,30,0.12);--blocked:#8b2a1a;--blocked-bright:#d44a2a;--green:#2a5c2a;--green-bright:#4a9c4a;--blue:#1a3a6b;--blue-bright:#4a7cc7;--text:#d4c4a0;--text-dim:#7a6a50;--text-bright:#f0e0c0}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:16px;min-height:100vh;overflow-x:hidden}
header{background:linear-gradient(180deg,#0d0a06,var(--surface));border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:0 4px 32px rgba(0,0,0,.6)}
.logo{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:900;color:var(--red-bright);letter-spacing:.15em;text-transform:uppercase;display:flex;align-items:center;gap:.75rem}
.logo-icon{width:24px;height:24px;background:var(--red);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:torchflicker 3s ease-in-out infinite}
@keyframes torchflicker{0%,100%{opacity:1;transform:scale(1)}25%{opacity:.8;transform:scale(.97)}50%{opacity:1;transform:scale(1.02)}75%{opacity:.9;transform:scale(.98)}}
.header-right{display:flex;align-items:center;gap:1.5rem}
.header-stats{display:flex;gap:2rem;align-items:center}
.stat-item{text-align:center}
.stat-num{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:600;color:var(--red-bright);display:block;line-height:1}
.stat-label{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em}
.stat-divider{width:1px;height:32px;background:var(--border)}
.sync-badge{display:flex;align-items:center;gap:.4rem;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);padding:.3rem .7rem;border:1px solid var(--border);border-radius:2px;transition:border-color .3s}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);transition:background .3s}
.sync-badge.syncing .sync-dot{background:var(--red-bright);animation:blink .7s infinite}
.sync-badge.synced .sync-dot,.sync-badge.live .sync-dot{background:var(--green-bright)}
.sync-badge.live .sync-dot{animation:blink 2s infinite}
.sync-badge.live{border-color:rgba(74,156,74,.35)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.progress-bar-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:.6rem 2rem;display:flex;align-items:center;gap:1rem}
.progress-label{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;white-space:nowrap;min-width:120px}
.progress-track{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red-dim),var(--red-bright));border-radius:3px;transition:width .5s ease;box-shadow:0 0 8px var(--red)}
.progress-pct{font-family:'Cinzel',serif;font-size:.85rem;color:var(--red-bright);min-width:40px;text-align:right}
.collab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.35rem 2rem;display:flex;align-items:center;gap:.75rem}
.collab-label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim)}
.collab-avatars{display:flex;gap:.3rem}
.collab-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-family:'Cinzel',serif;border:1px solid;cursor:default;transition:transform .15s}
.collab-avatar:hover{transform:scale(1.2)}
.last-sync{margin-left:auto;font-size:.68rem;color:var(--text-dim);font-style:italic}
.container{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 118px);overflow:hidden}
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--red-dim) var(--surface)}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:var(--red-dim)}
.sidebar-section-title{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;padding:1.2rem 1.2rem .5rem;border-top:1px solid var(--border)}
.sidebar-section-title:first-child{border-top:none}
.phase-btn{display:flex;align-items:center;gap:.75rem;padding:.65rem 1.2rem;cursor:pointer;transition:all .15s;border-left:3px solid transparent;width:100%;background:none;border-right:none;border-top:none;border-bottom:none;text-align:left;color:var(--text);font-family:'Crimson Pro',serif;font-size:.95rem}
.phase-btn:hover{background:var(--red-glow);color:var(--text-bright)}
.phase-btn.active{background:var(--red-glow);border-left-color:var(--red);color:var(--red-bright)}
.phase-num{font-family:'Cinzel',serif;font-size:.7rem;color:var(--red-dim);min-width:20px}
.phase-btn.active .phase-num{color:var(--red)}
.phase-mini-progress{margin-left:auto;font-size:.7rem;color:var(--text-dim)}
.phase-btn.active .phase-mini-progress{color:var(--red)}
.main-content{overflow-y:auto;padding:2rem;scrollbar-width:thin;scrollbar-color:var(--red-dim) var(--bg)}
.main-content::-webkit-scrollbar{width:4px}.main-content::-webkit-scrollbar-thumb{background:var(--red-dim)}
.panel-header{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.panel-header-left{flex:1}
.phase-tag{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--red-dim);margin-bottom:.4rem}
.panel-title{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:600;color:var(--text-bright);line-height:1.2;margin-bottom:.4rem}
.panel-subtitle{font-size:1rem;color:var(--text-dim);font-style:italic}
.phase-progress-ring{display:flex;flex-direction:column;align-items:center;gap:.3rem;flex-shrink:0}
.ring-pct{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--red-bright);line-height:1}
.ring-label{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em}
.task-group{margin-bottom:1.5rem}
.task-group-header{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.group-count{color:var(--red-dim);font-size:.7rem}
.task-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;margin-bottom:3px;background:var(--surface);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.task-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background .15s}
.task-item:hover{border-color:var(--red-dim);background:var(--surface2)}
.task-item:hover::before{background:var(--red-dim)}
.task-item.done::before{background:var(--green-bright)}
.task-item.done{opacity:.6}
.task-item.inprogress::before{background:var(--red);box-shadow:0 0 6px rgba(160,26,26,.5)}
.task-item.review::before{background:var(--blue-bright)}
.task-item.blocked::before{background:var(--blocked-bright)}
.task-check{width:18px;height:18px;border:1px solid var(--border);border-radius:2px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.75rem;transition:all .15s;cursor:pointer}
.task-item.done .task-check{background:var(--green);border-color:var(--green-bright);color:var(--green-bright)}
.task-item.inprogress .task-check{background:var(--red-dim);border-color:var(--red);color:var(--red-bright)}
.task-item.review .task-check{background:var(--blue);border-color:var(--blue-bright);color:var(--blue-bright)}
.task-item.blocked .task-check{background:var(--blocked);border-color:var(--blocked-bright);color:var(--blocked-bright)}
.task-text{flex:1;font-size:.95rem;color:var(--text);line-height:1.3}
.task-item.done .task-text{text-decoration:line-through;color:var(--text-dim)}
.task-meta-pills{display:flex;gap:.35rem;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:180px}
.task-pill{font-size:.58rem;padding:2px 6px;border-radius:2px;border:1px solid;font-family:'Cinzel',serif;letter-spacing:.04em;white-space:nowrap}
.pill-assign{border-color:rgba(74,124,199,.45);color:#6a9cd9;background:rgba(26,58,107,.3)}
.pill-time{border-color:rgba(74,156,74,.45);color:#80c880;background:rgba(42,92,42,.2)}
.task-status-btn{font-size:.65rem;padding:2px 8px;border-radius:2px;border:1px solid;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.05em;text-transform:uppercase;background:none;transition:all .15s;white-space:nowrap}
.btn-todo{border-color:var(--text-dim);color:var(--text-dim)}.btn-todo:hover{border-color:var(--red-dim);color:var(--red-dim)}
.btn-inprogress{border-color:var(--red);color:var(--red)}
.btn-review{border-color:var(--blue-bright);color:var(--blue-bright)}
.btn-done{border-color:var(--green-bright);color:var(--green-bright)}
.btn-blocked{border-color:var(--blocked-bright);color:var(--blocked-bright)}
.add-task-row{display:flex;gap:.5rem;margin-top:.75rem;margin-bottom:.5rem}
.add-task-input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem .75rem;font-family:'Crimson Pro',serif;font-size:.9rem;border-radius:3px;outline:none;transition:border-color .15s}
.add-task-input:focus{border-color:var(--red-dim)}
.add-task-input::placeholder{color:var(--text-dim);font-style:italic}
.add-task-btn-sm{background:var(--red-dim);border:1px solid var(--red);color:var(--red-bright);padding:.5rem 1rem;font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:all .15s}
.add-task-btn-sm:hover{background:var(--red);color:var(--bg)}
.notes-section{margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.notes-label{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;margin-bottom:.5rem}
.notes-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.75rem;font-family:'Crimson Pro',serif;font-size:.95rem;line-height:1.6;font-style:italic;resize:vertical;min-height:90px;border-radius:3px;outline:none}
.notes-input:focus{border-color:var(--red-dim)}
.overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.overview-card{background:var(--surface);border:1px solid var(--border);padding:1rem;border-radius:3px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.overview-card:hover{border-color:var(--red-dim);background:var(--surface2)}
.card-progress-bar{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,var(--red-dim),var(--red-bright));transition:width .6s ease}
.card-num{font-family:'Cinzel',serif;font-size:.65rem;color:var(--red-dim);letter-spacing:.1em;margin-bottom:.3rem}
.card-title{font-family:'Cinzel',serif;font-size:.9rem;font-weight:600;color:var(--text-bright);margin-bottom:.4rem;line-height:1.3}
.card-pct{font-size:1.8rem;font-family:'Cinzel',serif;color:var(--red-bright);line-height:1;margin-bottom:.2rem}
.card-tasks{font-size:.8rem;color:var(--text-dim)}
.legend{display:flex;gap:1.5rem;margin-bottom:1rem;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--text-dim)}
.legend-dot{width:8px;height:8px;border-radius:50%}
/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;right:0;top:0;bottom:0;width:400px;max-width:95vw;background:var(--surface);border-left:1px solid var(--border);z-index:301;transform:translateX(105%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow-y:auto}
.drawer::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);pointer-events:none}
.drawer.open{transform:translateX(0)}
.drawer-header{padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--surface2),var(--surface));position:sticky;top:0;z-index:1}
.drawer-phase-tag{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--red-dim);margin-bottom:.35rem}
.drawer-task-name{font-family:'Cinzel',serif;font-size:.95rem;color:var(--text-bright);line-height:1.45;margin-bottom:1rem;padding-right:2rem}
.drawer-status-row{display:flex;gap:.4rem;flex-wrap:wrap}
.status-chip{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:.28rem .65rem;border:1px solid var(--border);border-radius:2px;cursor:pointer;transition:all .15s;color:var(--text-dim);user-select:none}
.chip-todo.sel{background:rgba(122,106,80,.2);border-color:var(--text-dim);color:var(--text-bright)}
.chip-inprogress.sel{background:var(--red-dim);border-color:var(--red);color:var(--red-bright)}
.chip-review.sel{background:var(--blue);border-color:var(--blue-bright);color:var(--blue-bright)}
.chip-done.sel{background:var(--green);border-color:var(--green-bright);color:var(--green-bright)}
.chip-blocked.sel{background:var(--blocked);border-color:var(--blocked-bright);color:var(--blocked-bright)}
.status-chip:hover{border-color:var(--text-dim);color:var(--text)}
.drawer-body{padding:1.25rem 1.5rem;flex:1;display:flex;flex-direction:column;gap:1.2rem}
.drawer-field{display:flex;flex-direction:column;gap:.35rem}
.drawer-label{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim)}
.di{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.5rem .75rem;font-family:'Crimson Pro',serif;font-size:.95rem;border-radius:3px;outline:none;transition:border-color .15s;width:100%}
.di:focus{border-color:var(--red-dim)}
.di::placeholder{color:var(--text-dim);font-style:italic}
select.di{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.04em;cursor:pointer}
select.di option{background:var(--surface2)}
textarea.di{resize:vertical;min-height:90px;line-height:1.6;font-style:italic}
.drawer-footer{padding:1rem 1.5rem 1.5rem;display:flex;flex-direction:column;gap:.5rem;border-top:1px solid var(--border)}
.drawer-footer-actions{display:flex;gap:.6rem}
.drawer-save{flex:1;padding:.65rem;background:var(--red-dim);border:1px solid var(--red);color:var(--red-bright);font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .15s}
.drawer-save:hover{background:var(--red);color:var(--bg)}
.drawer-cancel{padding:.65rem 1rem;background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .15s}
.drawer-cancel:hover{border-color:var(--text-dim);color:var(--text)}
.drawer-delete{width:100%;padding:.6rem;background:none;border:1px solid #3a1010;color:#7a3030;font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .2s;margin-top:.25rem}
.drawer-delete:hover{background:rgba(160,26,26,.18);border-color:var(--red-bright);color:var(--red-bright);box-shadow:0 0
