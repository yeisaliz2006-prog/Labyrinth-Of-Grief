<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinth Of Grief — Production Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<!-- ═══════════════════════════════════════════════════
     FIREBASE SETUP
     ───────────────────────────────────────────────────
     1. Go to https://console.firebase.google.com
     2. Create a project → Build → Realtime Database → Create (test mode)
     3. Project Settings → Your apps → Web → copy firebaseConfig
     4. Paste your values below, replacing the placeholders
     ═══════════════════════════════════════════════════ -->


<style>
  :root {
    --bg: #0a0806;
    --surface: #120f0a;
    --surface2: #1a1410;
    --surface3: #221c15;
    --border: #2e2318;
    --red: #a01a1a;
    --red-bright: #e03030;
    --red-dim: #6b1a1a;
    --red-glow: rgba(180,30,30,0.12);
    --blocked: #8b2a1a;
    --blocked-bright: #d44a2a;
    --green: #2a5c2a;
    --green-bright: #4a9c4a;
    --blue: #1a3a6b;
    --blue-bright: #4a7cc7;
    --text: #d4c4a0;
    --text-dim: #7a6a50;
    --text-bright: #f0e0c0;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Crimson Pro',Georgia,serif; font-size:16px; min-height:100vh; overflow-x:hidden; }

  /* ── HEADER ── */
  header { background:linear-gradient(180deg,#0d0a06 0%,var(--surface) 100%); border-bottom:1px solid var(--border); padding:0 2rem; position:sticky; top:0; z-index:200; display:flex; align-items:center; justify-content:space-between; height:64px; box-shadow:0 4px 32px rgba(0,0,0,0.6); }
  .logo { font-family:'Cinzel',serif; font-size:1.1rem; font-weight:900; color:var(--red-bright); letter-spacing:0.15em; text-transform:uppercase; display:flex; align-items:center; gap:0.75rem; }
  .logo-icon { width:24px; height:24px; background:var(--red); clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); animation:torchflicker 3s ease-in-out infinite; }
  @keyframes torchflicker { 0%,100%{opacity:1;transform:scale(1)} 25%{opacity:0.8;transform:scale(0.97)} 50%{opacity:1;transform:scale(1.02)} 75%{opacity:0.9;transform:scale(0.98)} }
  .header-right { display:flex; align-items:center; gap:1.5rem; }
  .header-stats { display:flex; gap:2rem; align-items:center; }
  .stat-item { text-align:center; }
  .stat-num { font-family:'Cinzel',serif; font-size:1.4rem; font-weight:600; color:var(--red-bright); display:block; line-height:1; }
  .stat-label { font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.1em; }
  .stat-divider { width:1px; height:32px; background:var(--border); }
  .sync-badge { display:flex; align-items:center; gap:0.4rem; font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); padding:0.3rem 0.7rem; border:1px solid var(--border); border-radius:2px; transition:border-color 0.3s; }
  .sync-dot { width:6px; height:6px; border-radius:50%; background:var(--text-dim); transition:background 0.3s; }
  .sync-badge.syncing .sync-dot { background:var(--red-bright); animation:blink 0.7s infinite; }
  .sync-badge.synced  .sync-dot { background:var(--green-bright); }
  .sync-badge.live    .sync-dot { background:var(--green-bright); animation:blink 2s infinite; }
  .sync-badge.live    { border-color:rgba(74,156,74,0.35); }
  .sync-badge.config  .sync-dot { background:#c8a030; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ── PROGRESS ── */
  .progress-bar-wrap { background:var(--surface); border-bottom:1px solid var(--border); padding:0.6rem 2rem; display:flex; align-items:center; gap:1rem; }
  .progress-label { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase; white-space:nowrap; min-width:120px; }
  .progress-track { flex:1; height:6px; background:var(--surface3); border-radius:3px; overflow:hidden; border:1px solid var(--border); }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--red-dim),var(--red-bright)); border-radius:3px; transition:width 0.5s ease; box-shadow:0 0 8px var(--red); }
  .progress-pct { font-family:'Cinzel',serif; font-size:0.85rem; color:var(--red-bright); min-width:40px; text-align:right; }

  /* ── COLLAB BAR ── */
  .collab-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:0.35rem 2rem; display:flex; align-items:center; gap:0.75rem; }
  .collab-label { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-dim); }
  .collab-avatars { display:flex; gap:0.3rem; }
  .collab-avatar { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.58rem; font-family:'Cinzel',serif; border:1px solid; cursor:default; transition:transform 0.15s; }
  .collab-avatar:hover { transform:scale(1.2); }
  .last-sync { margin-left:auto; font-size:0.68rem; color:var(--text-dim); font-style:italic; }

  /* ── LAYOUT ── */
  .container { display:grid; grid-template-columns:260px 1fr; height:calc(100vh - 118px); overflow:hidden; }
  .sidebar { background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--red-dim) var(--surface); }
  .sidebar::-webkit-scrollbar{width:4px} .sidebar::-webkit-scrollbar-thumb{background:var(--red-dim)}
  .sidebar-section-title { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.15em; color:var(--text-dim); text-transform:uppercase; padding:1.2rem 1.2rem 0.5rem; border-top:1px solid var(--border); }
  .sidebar-section-title:first-child { border-top:none; }
  .phase-btn { display:flex; align-items:center; gap:0.75rem; padding:0.65rem 1.2rem; cursor:pointer; transition:all 0.15s; border-left:3px solid transparent; width:100%; background:none; border-right:none; border-top:none; border-bottom:none; text-align:left; color:var(--text); font-family:'Crimson Pro',serif; font-size:0.95rem; }
  .phase-btn:hover { background:var(--red-glow); color:var(--text-bright); }
  .phase-btn.active { background:var(--red-glow); border-left-color:var(--red); color:var(--red-bright); }
  .phase-num { font-family:'Cinzel',serif; font-size:0.7rem; color:var(--red-dim); min-width:20px; }
  .phase-btn.active .phase-num { color:var(--red); }
  .phase-mini-progress { margin-left:auto; font-size:0.7rem; color:var(--text-dim); }
  .phase-btn.active .phase-mini-progress { color:var(--red); }
  .main-content { overflow-y:auto; padding:2rem; scrollbar-width:thin; scrollbar-color:var(--red-dim) var(--bg); }
  .main-content::-webkit-scrollbar{width:4px} .main-content::-webkit-scrollbar-thumb{background:var(--red-dim)}
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  /* ── PANELS ── */
  .panel-header { margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; }
  .panel-header-left { flex:1; }
  .phase-tag { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--red-dim); margin-bottom:0.4rem; }
  .panel-title { font-family:'Cinzel',serif; font-size:1.6rem; font-weight:600; color:var(--text-bright); line-height:1.2; margin-bottom:0.4rem; }
  .panel-subtitle { font-size:1rem; color:var(--text-dim); font-style:italic; }
  .phase-progress-ring { display:flex; flex-direction:column; align-items:center; gap:0.3rem; flex-shrink:0; }
  .ring-pct { font-family:'Cinzel',serif; font-size:1.5rem; color:var(--red-bright); line-height:1; }
  .ring-label { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.1em; }

  /* ── TASKS ── */
  .task-group { margin-bottom:1.5rem; }
  .task-group-header { font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase; margin-bottom:0.6rem; padding-bottom:0.4rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:0.5rem; }
  .group-count { color:var(--red-dim); font-size:0.7rem; }
  .task-item { display:flex; align-items:center; gap:0.75rem; padding:0.6rem 0.75rem; margin-bottom:3px; background:var(--surface); border:1px solid var(--border); border-radius:3px; cursor:pointer; transition:all 0.15s; position:relative; overflow:hidden; }
  .task-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--border); transition:background 0.15s; }
  .task-item:hover { border-color:var(--red-dim); background:var(--surface2); }
  .task-item:hover::before { background:var(--red-dim); }
  .task-item.done::before { background:var(--green-bright); }
  .task-item.done { opacity:0.6; }
  .task-item.inprogress::before { background:var(--red); box-shadow:0 0 6px rgba(160,26,26,0.5); }
  .task-item.review::before { background:var(--blue-bright); }
  .task-item.blocked::before { background:var(--blocked-bright); }
  .task-check { width:18px; height:18px; border:1px solid var(--border); border-radius:2px; background:var(--surface2); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:0.75rem; transition:all 0.15s; cursor:pointer; }
  .task-item.done .task-check { background:var(--green); border-color:var(--green-bright); color:var(--green-bright); }
  .task-item.inprogress .task-check { background:var(--red-dim); border-color:var(--red); color:var(--red-bright); }
  .task-item.review .task-check { background:var(--blue); border-color:var(--blue-bright); color:var(--blue-bright); }
  .task-item.blocked .task-check { background:var(--blocked); border-color:var(--blocked-bright); color:var(--blocked-bright); }
  .task-text { flex:1; font-size:0.95rem; color:var(--text); line-height:1.3; }
  .task-item.done .task-text { text-decoration:line-through; color:var(--text-dim); }
  .task-meta-pills { display:flex; gap:0.35rem; align-items:center; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; max-width:180px; }
  .task-pill { font-size:0.58rem; padding:2px 6px; border-radius:2px; border:1px solid; font-family:'Cinzel',serif; letter-spacing:0.04em; white-space:nowrap; }
  .pill-assign { border-color:rgba(74,124,199,0.45); color:#6a9cd9; background:rgba(26,58,107,0.3); }
  .pill-time   { border-color:rgba(74,156,74,0.45); color:#80c880; background:rgba(42,92,42,0.2); }
  .task-status-btn { font-size:0.65rem; padding:2px 8px; border-radius:2px; border:1px solid; cursor:pointer; font-family:'Cinzel',serif; letter-spacing:0.05em; text-transform:uppercase; background:none; transition:all 0.15s; white-space:nowrap; }
  .btn-todo      { border-color:var(--text-dim); color:var(--text-dim); }
  .btn-todo:hover{ border-color:var(--red-dim); color:var(--red-dim); }
  .btn-inprogress{ border-color:var(--red); color:var(--red); }
  .btn-review    { border-color:var(--blue-bright); color:var(--blue-bright); }
  .btn-done      { border-color:var(--green-bright); color:var(--green-bright); }
  .btn-blocked   { border-color:var(--blocked-bright); color:var(--blocked-bright); }
  .add-task-row { display:flex; gap:0.5rem; margin-top:0.75rem; margin-bottom:0.5rem; }
  .add-task-input { flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:0.5rem 0.75rem; font-family:'Crimson Pro',serif; font-size:0.9rem; border-radius:3px; outline:none; transition:border-color 0.15s; }
  .add-task-input:focus { border-color:var(--red-dim); }
  .add-task-input::placeholder { color:var(--text-dim); font-style:italic; }
  .add-task-btn-sm { background:var(--red-dim); border:1px solid var(--red); color:var(--red-bright); padding:0.5rem 1rem; font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; border-radius:3px; cursor:pointer; transition:all 0.15s; }
  .add-task-btn-sm:hover { background:var(--red); color:var(--bg); }
  .notes-section { margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--border); }
  .notes-label { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase; margin-bottom:0.5rem; }
  .notes-input { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:0.75rem; font-family:'Crimson Pro',serif; font-size:0.95rem; line-height:1.6; font-style:italic; resize:vertical; min-height:90px; border-radius:3px; outline:none; }
  .notes-input:focus { border-color:var(--red-dim); }

  /* ── OVERVIEW ── */
  .overview-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
  .overview-card { background:var(--surface); border:1px solid var(--border); padding:1rem; border-radius:3px; cursor:pointer; transition:all 0.15s; position:relative; overflow:hidden; }
  .overview-card:hover { border-color:var(--red-dim); background:var(--surface2); }
  .card-progress-bar { position:absolute; bottom:0; left:0; height:2px; background:linear-gradient(90deg,var(--red-dim),var(--red-bright)); transition:width 0.6s ease; }
  .card-num { font-family:'Cinzel',serif; font-size:0.65rem; color:var(--red-dim); letter-spacing:0.1em; margin-bottom:0.3rem; }
  .card-title { font-family:'Cinzel',serif; font-size:0.9rem; font-weight:600; color:var(--text-bright); margin-bottom:0.4rem; line-height:1.3; }
  .card-pct { font-size:1.8rem; font-family:'Cinzel',serif; color:var(--red-bright); line-height:1; margin-bottom:0.2rem; }
  .card-tasks { font-size:0.8rem; color:var(--text-dim); }
  .legend { display:flex; gap:1.5rem; margin-bottom:1rem; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:0.4rem; font-size:0.8rem; color:var(--text-dim); }
  .legend-dot { width:8px; height:8px; border-radius:50%; }

  /* ── DRAWER ── */
  .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .drawer-overlay.open { opacity:1; pointer-events:all; }
  .drawer { position:fixed; right:0; top:0; bottom:0; width:400px; max-width:95vw; background:var(--surface); border-left:1px solid var(--border); z-index:301; transform:translateX(105%); transition:transform 0.28s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column; overflow-y:auto; }
  .drawer::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--red),transparent); pointer-events:none; }
  .drawer.open { transform:translateX(0); }
  .drawer-header { padding:1.5rem 1.5rem 1rem; border-bottom:1px solid var(--border); background:linear-gradient(180deg,var(--surface2),var(--surface)); position:sticky; top:0; z-index:1; }
  .drawer-phase-tag { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--red-dim); margin-bottom:0.35rem; }
  .drawer-task-name { font-family:'Cinzel',serif; font-size:0.95rem; color:var(--text-bright); line-height:1.45; margin-bottom:1rem; padding-right:2rem; }
  .drawer-task-name-input { font-family:'Cinzel',serif; font-size:0.95rem; color:var(--text-bright); line-height:1.45; margin-bottom:1rem; background:transparent; border:none; border-bottom:1px solid var(--border); outline:none; width:100%; padding:0.25rem 2rem 0.25rem 0; transition:border-color 0.2s; }
  .drawer-task-name-input:focus { border-bottom-color:var(--red-dim); }
  .drawer-task-name-input::placeholder { color:var(--text-dim); font-style:italic; }
  .drawer-status-row { display:flex; gap:0.4rem; flex-wrap:wrap; }
  .status-chip { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.28rem 0.65rem; border:1px solid var(--border); border-radius:2px; cursor:pointer; transition:all 0.15s; color:var(--text-dim); user-select:none; }
  .chip-todo.sel      { background:rgba(122,106,80,0.2); border-color:var(--text-dim); color:var(--text-bright); }
  .chip-inprogress.sel{ background:var(--red-dim); border-color:var(--red); color:var(--red-bright); }
  .chip-review.sel    { background:var(--blue); border-color:var(--blue-bright); color:var(--blue-bright); }
  .chip-done.sel      { background:var(--green); border-color:var(--green-bright); color:var(--green-bright); }
  .chip-blocked.sel   { background:var(--blocked); border-color:var(--blocked-bright); color:var(--blocked-bright); }
  .status-chip:hover  { border-color:var(--text-dim); color:var(--text); }
  .drawer-body { padding:1.25rem 1.5rem; flex:1; display:flex; flex-direction:column; gap:1.2rem; }
  .drawer-field { display:flex; flex-direction:column; gap:0.35rem; }
  .drawer-label { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-dim); }
  .di { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:0.5rem 0.75rem; font-family:'Crimson Pro',serif; font-size:0.95rem; border-radius:3px; outline:none; transition:border-color 0.15s; width:100%; }
  .di:focus { border-color:var(--red-dim); }
  .di::placeholder { color:var(--text-dim); font-style:italic; }
  select.di { font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:0.04em; cursor:pointer; }
  select.di option { background:var(--surface2); }
  textarea.di { resize:vertical; min-height:90px; line-height:1.6; font-style:italic; }
  .drawer-footer { padding:1rem 1.5rem 1.5rem; display:flex; gap:0.6rem; border-top:1px solid var(--border); }
  .drawer-save { flex:1; padding:0.65rem; background:var(--red-dim); border:1px solid var(--red); color:var(--red-bright); font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; border-radius:3px; transition:all 0.15s; }
  .drawer-save:hover { background:var(--red); color:var(--bg); }
  .drawer-cancel { padding:0.65rem 1rem; background:none; border:1px solid var(--border); color:var(--text-dim); font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; border-radius:3px; transition:all 0.15s; }
  .drawer-cancel:hover { border-color:var(--text-dim); color:var(--text); }
  .drawer-close-btn { position:absolute; top:1rem; right:1rem; background:none; border:1px solid var(--border); color:var(--text-dim); width:26px; height:26px; border-radius:2px; cursor:pointer; font-size:0.75rem; display:flex; align-items:center; justify-content:center; transition:all 0.15s; z-index:2; }
  .drawer-close-btn:hover { border-color:var(--red-dim); color:var(--text); }

  /* ── TOASTS ── */
  .toast-container { position:fixed; bottom:1.5rem; right:1.5rem; z-index:400; display:flex; flex-direction:column; gap:0.5rem; pointer-events:none; }
  .toast { background:var(--surface2); border:1px solid var(--border); border-left:3px solid var(--red); padding:0.6rem 1rem; font-size:0.82rem; color:var(--text); border-radius:3px; animation:toastIn 0.3s ease; max-width:300px; line-height:1.4; }
  .toast.fadeout { animation:toastOut 0.4s ease forwards; }
  @keyframes toastIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  @keyframes toastOut { to{opacity:0;transform:translateY(4px)} }

  /* ── CONFIG BANNER ── */
  .config-banner { background:rgba(200,160,48,0.12); border-bottom:1px solid rgba(200,160,48,0.3); padding:0.6rem 2rem; font-size:0.82rem; color:#c8a030; display:none; align-items:center; gap:0.5rem; }
  .config-banner.show { display:flex; }
  .config-banner strong { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.1em; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    Labyrinth Of Grief
  </div>
  <div class="header-right">
    <div class="header-stats">
      <div class="stat-item"><span class="stat-num" id="stat-done">0</span><span class="stat-label">Complete</span></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><span class="stat-num" id="stat-inprog">0</span><span class="stat-label">In Progress</span></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><span class="stat-num" id="stat-total">0</span><span class="stat-label">Total Tasks</span></div>
    </div>
    <div class="sync-badge syncing" id="syncBadge">
      <div class="sync-dot"></div>
      <span id="syncLabel">Connecting</span>
    </div>
  </div>
</header>

<div class="config-banner" id="configBanner">
  <strong>⚠ Firebase Not Configured</strong>
  — Open this HTML file, find the <code>firebaseConfig</code> block near the top, and paste your project credentials. Changes will be saved locally until then.
</div>

<div class="progress-bar-wrap">
  <span class="progress-label">Overall Progress</span>
  <div class="progress-track"><div class="progress-fill" id="global-fill" style="width:0%"></div></div>
  <span class="progress-pct" id="global-pct">0%</span>
</div>

<div class="collab-bar">
  <span class="collab-label">Online</span>
  <div class="collab-avatars" id="collabAvatars"></div>

  function initFirebase() {
    if (!CONFIGURED) {
      badge('config', 'Not Configured');
      toast('⚠ Firebase not configured — add your config to the HTML file', 6000);
      initLocalFallback();
      return;
    }
    try {
      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      stateRef = ref(db, 'pipeline/state');
      presenceRef = ref(db, 'pipeline/presence');
      badge('syncing');

      // Real-time listener — fires instantly on any remote change
      onValue(stateRef, (snapshot) => {
        const remote = snapshot.val() || {};

        show(currentId);
        updateStats();
        badge('live', 'Live');
        $('lastSync').textContent = 'Live · ' + new Date().toLocaleTimeString();
      });

      // Presence heartbeat
      heartbeat();
      setInterval(heartbeat, 15000);
      // Clean stale presence every 30s
      setInterval(cleanPresence, 30000);

      firebaseReady = true;
      toast('✦ Connected — You are ' + SID);
    } catch(e) {
      console.error('Firebase error:', e);
      badge('offline');
      toast('⚠ Firebase connection failed — check your config');
      initLocalFallback();
    }
  }

  // ── Local fallback (when Firebase not configured) ──
  function initLocalFallback() {
    try {
      const saved = localStorage.getItem('log-pipeline-local');
      if (saved) state = JSON.parse(saved);

    show('overview');
    updateStats();

  function localSave() {
    try { localStorage.setItem('log-pipeline-local', JSON.stringify(state)); } catch(e) {}
  }

  // ── Write to Firebase ──
  async function persist(patch) {
    Object.assign(state, patch);
    if (!CONFIGURED || !firebaseReady) { localSave(); show(currentId); updateStats(); return; }
    try {
      badge('syncing');
      await update(stateRef, patch);
      // onValue listener will handle re-render
    } catch(e) {
      badge('offline');
      toast('⚠ Save failed — check connection');
    }
  }

  // ── Presence ──
  async function heartbeat() {
    if (!CONFIGURED) return;
    try {
      const myRef = ref(db, 'pipeline/presence/' + SID);
      await set(myRef, { id: SID, color: MY_COLOR, ts: Date.now(), name: SID });
      const snap = await get(presenceRef);
      const all = snap.val() || {};
      const active = Object.values(all).filter(u => Date.now() - u.ts < 45000);
      renderAvatars(active);
      if (active.length > 1) badge('live', active.length + ' Online');
    } catch(e) {}
  }

  async function cleanPresence() {
    if (!CONFIGURED) return;
    try {
      const snap = await get(presenceRef);
      const all = snap.val() || {};
      const updates = {};
      for (const [k, v] of Object.entries(all)) {

  // ════════════════════════════════════

  // Firebase keys can't have . / # $ [ ]  — encode task text as base64-ish
  function fk(pid, g, t) {
    return pid + '|||' + g + '|||' + btoa(unescape(encodeURIComponent(t))).replace(/[.#$/[\]]/g,'_');
  }
  function getMeta(pid, g, t) { return state[fk(pid,g,t)] || {}; }
  function getS(pid, g, t)    { return getMeta(pid,g,t).status || 'todo'; }

  async function setMeta(pid, g, t, meta) {
    const k = fk(pid, g, t);
    const patch = {};
    patch[k] = { ...getMeta(pid, g, t), ...meta };
    await persist(patch);
  }

  function pStats(ph) {
    if (ph.isOverview) return { done:0, inprog:0, total:0 };
    let d=0, i=0, to=0;
    for (const g of ph.groups) {
      const ck = '__custom__' + ph.id + '__' + g.name;
      const custom = state[ck] ? Object.values(state[ck]) : [];
      // Apply renames: built-in tasks may have a renamed version stored in state
      const rk = '__renames__' + ph.id + '__' + g.name;
      const renames = state[rk] || {};
      const baseTasks = g.tasks.map(t => renames[t] || t);
      const all = [...baseTasks, ...custom];
      for (const t of all) { to++; const s=getS(ph.id,g.name,t); if(s==='done')d++; else if(s==='inprogress')i++; }
    }
    return { done:d, inprog:i, total:to };
  }

  function allStats() {
    let d=0, i=0, t=0;
    for (const p of PHASES) { if(p.isOverview)continue; const s=pStats(p); d+=s.done; i+=s.inprog; t+=s.total; }
    return { done:d, inprog:i, total:t };
  }

  function cyc(c) { return {todo:'inprogress',inprogress:'review',review:'done',done:'blocked',blocked:'todo'}[c]||'todo'; }
  function ico(s) { return {todo:'',inprogress:'◑',review:'◐',done:'✓',blocked:'✕'}[s]||''; }
  function slbl(s){ return {todo:'To Do',inprogress:'In Progress',review:'Review',done:'Done',blocked:'Blocked'}[s]||'To Do'; }
  function scls(s){ return {todo:'btn-todo',inprogress:'btn-inprogress',review:'btn-review',done:'btn-done',blocked:'btn-blocked'}[s]||'btn-todo'; }
  function tflbl(v){ return {'1-2h':'1-2h','half-day':'½day','1d':'1d','2-3d':'2-3d','1w':'1wk','2w':'2wk','1m':'1mo','ongoing':'∞'}[v]||v; }

  function pills(meta) {
    let p = '';
    if (meta.assignee) p += `<span class="task-pill pill-assign">⚔ ${meta.assignee}</span>`;
    if (meta.timeframe) p += `<span class="task-pill pill-time">◷ ${tflbl(meta.timeframe)}</span>`;
    return p;
  }

      h += `<button class="phase-btn ${aid===p.id?'active':''}" onclick="APP.show('${p.id}')">
        <span class="phase-num">${p.num}</span><span>${p.title}</span>
        ${s ? `<span class="phase-mini-progress">${pct}%</span>` : ''}
      </button>`;
    }
    $('sidebar').innerHTML = h;
  }

  function renderOverview() {
    const s=allStats(), pct=s.total?Math.round(s.done/s.total*100):0;
    let h = `<div class="panel-header">
      <div class="panel-header-left"><div class="phase-tag">★ Master View</div>
      <div class="panel-title">Labyrinth Of Grief</div>
      <div class="panel-subtitle">Full game development pipeline</div></div>
      <div class="phase-progress-ring"><div class="ring-pct">${pct}%</div><div class="ring-label">Complete</div></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--text-dim)"></div>To Do</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>In Progress</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue-bright)"></div>Review</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green-bright)"></div>Done</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blocked-bright)"></div>Blocked</div>
    </div><div class="overview-grid">`;
    for (const p of PHASES) {
      if (p.isOverview) continue;
      const ps=pStats(p), pp=ps.total?Math.round(ps.done/ps.total*100):0;
      h += `<div class="overview-card" onclick="APP.show('${p.id}')">
        <div class="card-progress-bar" style="width:${pp}%"></div>
        <div class="card-num">${p.num}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-pct">${pp}%</div>
        <div class="card-tasks">${ps.done}/${ps.total} tasks · ${ps.inprog} active</div>
      </div>`;
    }
    return h + '</div>';
  }

  function renderPhase(ph) {
    const s=pStats(ph), pct=s.total?Math.round(s.done/s.total*100):0;
    let h = `<div class="panel-header">
      <div class="panel-header-left"><div class="phase-tag">Phase ${ph.num}</div>
      <div class="panel-title">${ph.title}</div>
      <div class="panel-subtitle">${ph.subtitle}</div></div>
      <div class="phase-progress-ring"><div class="ring-pct">${pct}%</div><div class="ring-label">${s.done}/${s.total}</div></div>
    </div>`;
    for (const g of ph.groups) {
      const ck = '__custom__' + ph.id + '__' + g.name;
      const custom = state[ck] ? Object.values(state[ck]) : [];
      // Apply renames: built-in tasks may have a renamed version stored in state
      const rk = '__renames__' + ph.id + '__' + g.name;
      const renames = state[rk] || {};
      const baseTasks = g.tasks.map(t => renames[t] || t);
      const all = [...baseTasks, ...custom];
      const gd = all.filter(t => getS(ph.id,g.name,t)==='done').length;
      const ge = encodeURIComponent(g.name);
      h += `<div class="task-group"><div class="task-group-header"><span>${g.name}</span><span class="group-count">${gd}/${all.length}</span></div>`;
      for (const t of all) {
        const ts=getS(ph.id,g.name,t), meta=getMeta(ph.id,g.name,t);
        const te=encodeURIComponent(t);
        h += `<div class="task-item ${ts}" onclick="APP.openDrawer('${ph.id}','${ge}','${te}')">
          <div class="task-check" onclick="event.stopPropagation();APP.doToggle('${ph.id}','${ge}','${te}')">${ico(ts)}</div>
          <div class="task-text">${t}</div>
          <div class="task-meta-pills">${pills(meta)}</div>
          <button class="task-status-btn ${scls(ts)}" onclick="event.stopPropagation();APP.doCyc('${ph.id}','${ge}','${te}')">${slbl(ts)}</button>
        </div>`;
      }
      h += `<div class="add-task-row">
        <input class="add-task-input" type="text" placeholder="Add task to ${g.name}…"
          id="ni-${ph.id}-${ge}" onkeydown="if(event.key==='Enter')APP.doAdd('${ph.id}','${ge}')">
        <button class="add-task-btn-sm" onclick="APP.doAdd('${ph.id}','${ge}')">+ Add</button>
      </div></div>`;
    }
    const nk = '__note__' + ph.id;
    h += `<div class="notes-section"><div class="notes-label">Phase Notes</div>
      <textarea class="notes-input" placeholder="Notes, blockers, decisions…"
        onchange="APP.doNote('${ph.id}',this.value)">${state[nk]||''}</textarea>
    </div>`;
    return h;
  }

  // ════════════════════════════════════
  //  ACTIONS (exposed to global)
  // ════════════════════════════════════
  function show(id) {
    currentId = id;
    $('main-content').innerHTML = id==='overview' ? renderOverview() : renderPhase(PHASES.find(p=>p.id===id));
    renderSidebar(id);
    updateStats();
  }

  function updateStats() {
    const s=allStats(), p=s.total?Math.round(s.done/s.total*100):0;
    $('stat-done').textContent = s.done;
    $('stat-inprog').textContent = s.inprog;
    $('stat-total').textContent = s.total;
    $('global-fill').style.width = p+'%';
    $('global-pct').textContent = p+'%';
  }

  async function doToggle(pid, ge, te) {
    const g=decodeURIComponent(ge), t=decodeURIComponent(te);
    await setMeta(pid, g, t, { status: getS(pid,g,t)==='done'?'todo':'done' });
  }

  async function doCyc(pid, ge, te) {
    const g=decodeURIComponent(ge), t=decodeURIComponent(te);
    await setMeta(pid, g, t, { status: cyc(getS(pid,g,t)) });
  }

  async function doAdd(pid, ge) {
    const g=decodeURIComponent(ge);
    const inp = $('ni-'+pid+'-'+ge);
    if (!inp) return;
    const v = inp.value.trim(); if (!v) return;
    const ck = '__custom__'+pid+'__'+g;
    const existing = state[ck] || {};
    const idx = Object.keys(existing).length;
    const patch = {};
    patch[ck] = { ...existing, [idx]: v };
    await persist(patch);
    inp.value = '';
  }

  async function doNote(pid, val) {
    const patch = {};
    patch['__note__'+pid] = val;
    await persist(patch);
  }

  // ════════════════════════════════════
  //  DRAWER — Assignee, Timeframe, Notes
  // ════════════════════════════════════
  const STATUSES = ['todo','inprogress','review','done','blocked'];
  const SNAMES   = { todo:'To Do', inprogress:'In Progress', review:'Review', done:'Done', blocked:'Blocked' };

  function openDrawer(pid, ge, te) {
    const g=decodeURIComponent(ge), t=decodeURIComponent(te);
    dCtx = { pid, g, t };
    const meta=getMeta(pid,g,t), ph=PHASES.find(p=>p.id===pid);
    $('dPhaseTag').textContent      = 'Phase '+(ph?.num||'')+' — '+(ph?.title||'');
    $('dTaskNameDisplay').textContent = t;
    $('dTaskName').value              = t;
    $('dAssignee').value        = meta.assignee || '';
    $('dTimeframe').value       = meta.timeframe || '';
    $('dNotes').value           = meta.notes || '';
    dStatus = meta.status || 'todo';
    renderStatusChips();
    $('drawerOverlay').classList.add('open');
    $('drawer').classList.add('open');
    $('dAssignee').focus();
  }

  function closeDrawer() {
    $('drawerOverlay').classList.remove('open');
    $('drawer').classList.remove('open');
    dCtx = null;
  }

  function renderStatusChips() {
    $('dStatusRow').innerHTML = STATUSES.map(s =>
      `<div class="status-chip chip-${s}${dStatus===s?' sel':''}" onclick="APP.selStatus('${s}')">${SNAMES[s]}</div>`
    ).join('');
  }

  function selStatus(s) { dStatus=s; renderStatusChips(); }

  async function saveDrawer() {
    if (!dCtx) return;
    const { pid, g, t } = dCtx;
    const newName = ($('dTaskName').value || '').trim() || t;
    const meta = {
      status:    dStatus,
      assignee:  $('dAssignee').value.trim(),
      timeframe: $('dTimeframe').value,
      notes:     $('dNotes').value.trim(),
    };
    if (newName !== t) {
      const patch = {};
      // Copy meta from old key to new key
      patch[fk(pid, g, newName)] = { ...getMeta(pid, g, t), ...meta };
      patch[fk(pid, g, t)]       = null;

      const ck = '__custom__' + pid + '__' + g;
      const rk = '__renames__' + pid + '__' + g;

      // Check if it's a user-added (custom) task
      const customList = state[ck] ? { ...state[ck] } : null;
      const customEntry = customList && Object.entries(customList).find(([, v]) => v === t);

      if (customEntry) {
        // It's a custom task — update the custom list
        customList[customEntry[0]] = newName;
        patch[ck] = customList;
      } else {
        // It's a built-in task — store the rename in __renames__
        const currentRenames = { ...(state[rk] || {}) };
        // Remove any previous entry that pointed to t (in case t itself was already renamed)
        for (const [orig, renamed] of Object.entries(currentRenames)) {
          if (renamed === t) { currentRenames[orig] = newName; }
        }
        // If t wasn't already a renamed value, add a direct mapping
        if (!Object.values(currentRenames).includes(newName)) {
          currentRenames[t] = newName;
        }
        patch[rk] = currentRenames;
      }

      await persist(patch);
    } else {
      await setMeta(pid, g, t, meta);
    }
    closeDrawer();
    show(currentId);
    toast('❆ Task updated');
  }

  // Expose to window for inline onclick handlers
  window.APP = { show, openDrawer, closeDrawer, doToggle, doCyc, doAdd, doNote, selStatus, saveDrawer };

  // ════════════════════════════════════
  //  BOOT
  // ════════════════════════════════════
  // BOOT — defer until DOM is fully painted
  function boot() {
    renderSidebar('overview');
    show('overview');
    initFirebase();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    // DOMContentLoaded already fired (module scripts run after parse)
    boot();
  }

</script>
</body>
</html>
